<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Knight</title>
    <!-- Add Tone.js library for synthesized sound effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lato:wght@400;700&display=swap');

        body {
            background-color: #1a1a2e;
            color: #fff;
            font-family: 'Lato', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-wrapper {
            background: #16213e;
            border: 4px solid #d4af37; /* Gold */
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            position: relative;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            margin-top: 0;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #level-info {
            font-size: 1.2rem;
            color: #a8dadc;
            margin-bottom: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #battle-arena {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f3460;
            padding: 30px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            position: relative;
            border: 2px solid #2a4b7c;
            overflow: hidden;
            height: 200px;
        }

        /* Health Bar */
        #health-bar-bg {
            position: absolute;
            top: 10px;
            right: 20px;
            width: 150px;
            height: 15px;
            background: #333;
            border-radius: 8px;
            border: 2px solid #222;
            overflow: hidden;
        }

        #health-bar-fill {
            width: 100%;
            height: 100%;
            background: #e94560;
            transition: width 0.3s ease-out;
        }

        #hero-container {
            width: 120px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
            transition: transform 0.3s;
        }

        #hero-img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Right-sizes the image without stretching */
            filter: drop-shadow(0 0 10px rgba(242, 169, 0, 0.3)); /* Traces the transparent PNG outline */
            animation: breathe 2.5s infinite ease-in-out;
            transition: filter 0.3s;
        }

        .hero-charged #hero-img {
            filter: drop-shadow(0 0 25px rgba(242, 169, 0, 1)) brightness(1.2) !important;
        }

        #enemy-container {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #enemy-name {
            position: absolute;
            top: -25px;
            font-size: 14px;
            color: #ff6b6b;
            font-weight: bold;
            width: 100%;
            text-align: center;
        }

        #enemy-img {
            width: 120px;
            height: 160px;
            object-fit: contain; /* Right-sizes the demon */
            filter: drop-shadow(0 0 15px rgba(138, 43, 226, 0.6));
            animation: float-idle 3s infinite ease-in-out;
        }

        /* Idle Animations for Static Images */
        @keyframes breathe {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.02) translateY(-3px); }
        }

        @keyframes float-idle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Dash Attack Animation */
        .hero-attacking {
            animation: dash-attack 0.5s ease-in-out forwards;
        }
        @keyframes dash-attack {
            0% { transform: translateX(0) scale(1); }
            40% { transform: translateX(180px) scale(1.1); }
            50% { transform: translateX(180px) scale(1.1); }
            100% { transform: translateX(0) scale(1); }
        }

        /* Enemy Hit Reactions */
        .enemy-hit { animation: shake 0.4s; filter: brightness(2) !important; }
        .enemy-dead { animation: fade-out-drop 1s forwards; }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
        @keyframes fade-out-drop {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(50px); }
        }

        /* Enemy Movement Patterns */
        .move-side-to-side { animation: side-side 3s ease-in-out infinite alternate; }
        .move-diagonal { animation: diagonal 2.5s ease-in-out infinite alternate; }
        .move-circular { animation: circular 4s linear infinite; }
        .move-blink { animation: blink-jump 4s infinite; }
        .move-random { animation: random-dart 3s infinite; }

        @keyframes side-side { 0% { transform: translateX(-60px); } 100% { transform: translateX(60px); } }
        @keyframes diagonal { 0% { transform: translate(-50px, -40px); } 100% { transform: translate(50px, 40px); } }
        @keyframes circular { 0% { transform: translate(0, 0); } 25% { transform: translate(50px, -30px); } 50% { transform: translate(0, 0); } 75% { transform: translate(-50px, 30px); } 100% { transform: translate(0, 0); } }
        @keyframes blink-jump { 0%, 20% { opacity: 1; transform: translate(0,0); } 25% { opacity: 0; transform: translate(0,0); } 30% { opacity: 0; transform: translate(-60px, 20px); } 35%, 60% { opacity: 1; transform: translate(-60px, 20px); } 65% { opacity: 0; transform: translate(-60px, 20px); } 70% { opacity: 0; transform: translate(50px, -30px); } 75%, 95% { opacity: 1; transform: translate(50px, -30px); } 100% { opacity: 0; transform: translate(0,0); } }
        @keyframes random-dart { 0%, 100% { transform: translate(0,0); } 15%, 25% { transform: translate(60px, -15px); } 40%, 50% { transform: translate(-50px, -40px); } 65%, 75% { transform: translate(-60px, 30px); } 90% { transform: translate(40px, 25px); } }

        /* Strike Zone & Slash Visuals */
        #arena-strike-zone {
            position: absolute;
            top: 20px;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            border: 3px dashed rgba(46, 204, 113, 0.6);
            background: rgba(46, 204, 113, 0.15);
            border-radius: 12px;
            z-index: 5; 
            display: none;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.3);
        }
        .show-zone {
            display: block !important;
            animation: pulse-zone 1s infinite alternate;
        }
        @keyframes pulse-zone { 0% { border-color: rgba(46, 204, 113, 0.4); background: rgba(46, 204, 113, 0.1); } 100% { border-color: rgba(46, 204, 113, 0.9); background: rgba(46, 204, 113, 0.3); box-shadow: 0 0 20px rgba(46, 204, 113, 0.6); } }

        #slash-effect {
            position: absolute;
            width: 100px;
            height: 100px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M10,90 L90,10" stroke="%23fff" stroke-width="8" stroke-linecap="round"/><path d="M10,90 L90,10" stroke="%23f2a900" stroke-width="4" stroke-linecap="round"/></svg>') no-repeat center;
            background-size: contain;
            opacity: 0;
            z-index: 20;
            pointer-events: none;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.5);
        }
        .show-slash { animation: slash-anim 0.3s ease-out forwards; }
        @keyframes slash-anim { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); } }

        #message-log {
            min-height: 50px;
            font-style: italic;
            color: #a8dadc;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.4);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #math-ui {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        #equation { font-size: 28px; font-weight: bold; }
        #math-input {
            font-size: 24px; padding: 10px; width: 120px; text-align: center;
            border-radius: 8px; border: 2px solid #d4af37; background: #1a1a2e; color: white;
            outline: none; transition: box-shadow 0.2s;
        }
        #math-input:focus { box-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }

        #timing-ui { display: none; }

        button {
            background: linear-gradient(180deg, #f1c40f, #f39c12);
            color: #1a1a2e; font-family: 'Cinzel', serif; font-size: 20px; font-weight: bold;
            border: 2px solid #d4af37; padding: 12px 30px; border-radius: 8px;
            cursor: pointer; transition: transform 0.1s, filter 0.2s; text-transform: uppercase;
        }
        button:hover { filter: brightness(1.2); transform: scale(1.05); }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <h1>Math Knight</h1>
        <div id="level-info">Level 1</div>
        
        <div id="battle-arena">
            <div id="hero-container">
                <!-- Using the new transparent hero action image -->
                <img id="hero-img" src="hero_action.png" alt="Hero" onerror="this.src='https://placehold.co/120x160/333/f2a900?text=Hero'">
            </div>
            
            <div id="enemy-container">
                <div id="health-bar-bg"><div id="health-bar-fill"></div></div>
                <div id="enemy-name">Demon</div>
                <div id="arena-strike-zone"></div>
                <div id="slash-effect"></div>
                
                <div id="enemy-movement-wrapper" class="move-side-to-side" style="z-index: 10;">
                    <img id="enemy-img" src="demon_4_action.png" alt="Demon" onerror="this.src='https://placehold.co/120x160/333/e94560?text=Demon'">
                </div>
            </div>
        </div>

        <div id="message-log">A new Demon appears! Calculate to prime your blade.</div>

        <div id="math-ui">
            <span id="equation">?</span>
            <input type="number" id="math-input" placeholder="?" onkeypress="handleEnter(event)" />
            <button onclick="chargeSword()">Charge Magic</button>
        </div>

        <div id="timing-ui">
            <button onclick="slash()">⚡ SLASH! ⚡</button>
        </div>
    </div>

    <script>
        // --- Tone.js Sound Effects Setup ---
        let isAudioInitialized = false;
        let synthMiss, synthParry, synthHit, noiseHit;

        async function initAudio() {
            if (isAudioInitialized) return;
            await Tone.start();
            
            // Miss Synth: Swoosh/Wind sound
            synthMiss = new Tone.NoiseSynth({
                noise: { type: 'pink' },
                envelope: { attack: 0.1, decay: 0.2, sustain: 0, release: 0.1 },
                volume: -10
            }).toDestination();
            
            // Parry Synth: Metallic Clank
            synthParry = new Tone.MetalSynth({
                frequency: 200,
                envelope: { attack: 0.001, decay: 0.2, release: 0.01 },
                harmonicity: 5.1,
                modulationIndex: 32,
                resonance: 4000,
                octaves: 1.5,
                volume: -5
            }).toDestination();
            
            // Hit Synth: Magical Strike (Chord + Impact)
            synthHit = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: 'fmtriangle', modulationType: 'sine' },
                envelope: { attack: 0.01, decay: 0.2, sustain: 0.2, release: 1.5 },
                volume: -5
            }).toDestination();
            
            noiseHit = new Tone.NoiseSynth({
                noise: { type: 'white' },
                envelope: { attack: 0.001, decay: 0.1, sustain: 0, release: 0.1 },
                volume: -10
            }).toDestination();

            isAudioInitialized = true;
        }

        function playMissSound() { if (isAudioInitialized) synthMiss.triggerAttackRelease("8n"); }
        function playParrySound() { if (isAudioInitialized) synthParry.triggerAttackRelease("16n"); }
        function playHitSound() {
            if (isAudioInitialized) {
                synthHit.triggerAttackRelease(["C4", "E4", "G4", "C5"], "8n");
                noiseHit.triggerAttackRelease("16n");
            }
        }

        // Game State Variables
        let currentAnswer = 0;
        let playerCurrentAnswer = 0;
        let enemyMaxHP = 4;
        let enemyHP = 4;
        let isAttacking = false;
        let isSameQuestion = false;
        
        // Progression
        let currentLevel = 1;
        let enemiesDefeatedInLevel = 0;
        const enemiesPerLevel = 4;
        let difficultyLevel = 0; // 0: Easy, 1: Medium, 2: Hard
        let questionDamage = 1;  
        let currentAnimSpeed = 3;
        
        // Enemy Data (All using demon_4_action.png for now!)
        const demonList = [
            { name: "Dust-Mite Golem", file: "demon_4_action.png", moveClass: "move-side-to-side", baseSpeed: 3 },
            { name: "Chaos Construct", file: "demon_4_action.png", moveClass: "move-diagonal", baseSpeed: 2.5 },
            { name: "Rune Weaver", file: "demon_4_action.png", moveClass: "move-circular", baseSpeed: 4 },
            { name: "Void Emissary", file: "demon_4_action.png", moveClass: "move-blink", baseSpeed: 4 },
            { name: "Shadow Dancer", file: "demon_4_action.png", moveClass: "move-random", baseSpeed: 3 }
        ];

        // DOM Elements
        const equationEl = document.getElementById('equation');
        const mathInputEl = document.getElementById('math-input');
        const messageLogEl = document.getElementById('message-log');
        const enemyHealthEl = document.getElementById('health-bar-fill');
        const mathUI = document.getElementById('math-ui');
        const timingUI = document.getElementById('timing-ui');
        const heroContainer = document.getElementById('hero-container');
        const enemyContainer = document.getElementById('enemy-container');
        const enemyNameEl = document.getElementById('enemy-name');
        const enemyMovementWrapper = document.getElementById('enemy-movement-wrapper');
        const enemyImg = document.getElementById('enemy-img');
        const slashEffect = document.getElementById('slash-effect');
        const strikeZoneEl = document.getElementById('arena-strike-zone');
        const levelInfoEl = document.getElementById('level-info');

        function generateProblem() {
            if (isSameQuestion) {
                // Keep the same question, just clear input
                mathInputEl.value = '';
                mathInputEl.focus();
                return; 
            }

            let num1, num2;

            if (currentLevel === 1) { 
                // Level 1: Addition
                if (difficultyLevel === 0) { num1 = Math.floor(Math.random() * 9) + 1; num2 = Math.floor(Math.random() * 9) + 1; questionDamage = 1; }
                else if (difficultyLevel === 1) { num1 = Math.floor(Math.random() * 9) + 1; num2 = Math.floor(Math.random() * 10) + 10; questionDamage = 2; }
                else { num1 = Math.floor(Math.random() * 9) + 1; num2 = Math.floor(Math.random() * 40) + 20; questionDamage = 3; }
                currentAnswer = num1 + num2;
                equationEl.innerText = `${num1} + ${num2} = ?`;
            } else if (currentLevel === 2) { 
                // Level 2: Subtraction (No negatives)
                if (difficultyLevel === 0) { num1 = Math.floor(Math.random() * 9) + 1; num2 = Math.floor(Math.random() * num1); questionDamage = 1; }
                else if (difficultyLevel === 1) { num1 = Math.floor(Math.random() * 10) + 10; num2 = Math.floor(Math.random() * 9) + 1; questionDamage = 2; }
                else { num1 = Math.floor(Math.random() * 30) + 20; num2 = Math.floor(Math.random() * (num1 - 10)) + 10; questionDamage = 3; }
                currentAnswer = num1 - num2;
                equationEl.innerText = `${num1} - ${num2} = ?`;
            } else { 
                // Level 3: Multiplication
                if (difficultyLevel === 0) { num1 = Math.floor(Math.random() * 4) + 2; num2 = Math.floor(Math.random() * 4) + 2; questionDamage = 1; }
                else if (difficultyLevel === 1) { num1 = Math.floor(Math.random() * 8) + 2; num2 = Math.floor(Math.random() * 4) + 2; questionDamage = 2; }
                else { num1 = Math.floor(Math.random() * 4) + 6; num2 = Math.floor(Math.random() * 4) + 6; questionDamage = 3; }
                currentAnswer = num1 * num2;
                equationEl.innerText = `${num1} × ${num2} = ?`;
            }
            
            mathInputEl.value = '';
            mathInputEl.focus();
        }

        function handleEnter(e) {
            if (e.key === 'Enter') {
                chargeSword();
            }
        }

        function chargeSword() {
            if (mathInputEl.value === '') return;
            
            initAudio(); // Boot up audio engine
            
            // Store player answer blindly
            playerCurrentAnswer = parseInt(mathInputEl.value);
            
            messageLogEl.innerText = "Magic Charged! Strike when the demon enters the zone!";
            messageLogEl.style.color = "#f2a900";
            
            heroContainer.classList.add('hero-charged');
            strikeZoneEl.classList.add('show-zone');
            
            mathUI.style.display = 'none';
            timingUI.style.display = 'block';
        }

        function slash() {
            if (isAttacking) return;
            isAttacking = true;
            
            heroContainer.classList.remove('hero-charged');
            heroContainer.classList.add('hero-attacking');

            setTimeout(() => {
                evaluateHit();
            }, 250); // Evaluate hit at peak of dash

            setTimeout(() => {
                heroContainer.classList.remove('hero-attacking');
            }, 500); // Reset dash
        }

        function evaluateHit() {
            slashEffect.classList.add('show-slash');
            setTimeout(() => slashEffect.classList.remove('show-slash'), 300);
            
            // 1. Fetch coordinates BEFORE hiding the strike zone!
            const enemyRect = enemyImg.getBoundingClientRect();
            const zoneRect = strikeZoneEl.getBoundingClientRect();

            // 2. Now hide the strike zone
            strikeZoneEl.classList.remove('show-zone');

            const isOverlapping = !(
                enemyRect.right < zoneRect.left ||
                enemyRect.left > zoneRect.right ||
                enemyRect.bottom < zoneRect.top ||
                enemyRect.top > zoneRect.bottom
            );

            if (!isOverlapping) {
                // OUTCOME 1: Missed the window entirely
                playMissSound();
                messageLogEl.innerText = "Whiff! You missed! The Demon evades and moves faster!";
                messageLogEl.style.color = "#e94560";
                
                // Speed up demon
                currentAnimSpeed = Math.max(0.5, currentAnimSpeed * 0.75);
                enemyMovementWrapper.style.animationDuration = currentAnimSpeed + 's';
                
                // Lower difficulty, new easier question
                difficultyLevel = Math.max(0, difficultyLevel - 1);
                isSameQuestion = false;

            } else {
                // Physical hit succeeded. Check the math!
                if (playerCurrentAnswer !== currentAnswer) {
                    // OUTCOME 2: Hit, but wrong math (Parry)
                    playParrySound();
                    let hint = playerCurrentAnswer > currentAnswer ? "Too High" : "Too Low";
                    messageLogEl.innerText = `Parried! Math flawed (${hint})! Try the same equation again.`;
                    messageLogEl.style.color = "#e67e22";
                    
                    difficultyLevel = Math.max(0, difficultyLevel - 1);
                    isSameQuestion = true;
                    
                    enemyContainer.classList.add('enemy-hit');
                    setTimeout(() => enemyContainer.classList.remove('enemy-hit'), 400);

                } else {
                    // OUTCOME 3: Hit & Correct Math
                    playHitSound();
                    messageLogEl.innerText = `Direct Hit! Perfect Math! (-${questionDamage} HP)`;
                    messageLogEl.style.color = "#2ecc71";
                    
                    enemyHP -= questionDamage;
                    difficultyLevel = Math.min(2, difficultyLevel + 1);
                    isSameQuestion = false;

                    enemyContainer.classList.add('enemy-hit');
                    setTimeout(() => enemyContainer.classList.remove('enemy-hit'), 400);
                }
            }

            updateHealthBar();

            setTimeout(() => {
                if (enemyHP <= 0) {
                    enemyDefeated();
                } else {
                    resetForNextTurn();
                }
            }, 1000);
        }

        function updateHealthBar() {
            let displayHP = enemyHP < 0 ? 0 : enemyHP;
            let hpPercentage = (displayHP / enemyMaxHP) * 100;
            enemyHealthEl.style.width = hpPercentage + '%';
        }

        function resetForNextTurn() {
            timingUI.style.display = 'none';
            mathUI.style.display = 'flex';
            strikeZoneEl.classList.remove('show-zone');
            
            if (enemyHP > 0) {
                messageLogEl.innerText = "Keep up the pressure! Calculate the next strike.";
                messageLogEl.style.color = "#c5c6c7";
            }
            
            generateProblem();
            isAttacking = false;
        }

        function enemyDefeated() {
            messageLogEl.innerText = "Demon Banished!";
            messageLogEl.style.color = "#d4af37";
            enemyContainer.classList.add('enemy-dead');
            
            enemiesDefeatedInLevel++;
            
            setTimeout(() => {
                if (enemiesDefeatedInLevel >= enemiesPerLevel) {
                    levelUp();
                } else {
                    spawnNextEnemy();
                }
            }, 1500);
        }
        
        function levelUp() {
            currentLevel++;
            enemiesDefeatedInLevel = 0;
            difficultyLevel = 0; 
            
            if (currentLevel > 3) {
                levelInfoEl.innerText = "VICTORY";
                messageLogEl.innerText = "VICTORY! You have cleared all 3 levels!";
                messageLogEl.style.color = "#2ecc71";
                enemyContainer.style.display = 'none';
                mathUI.style.display = 'none';
                timingUI.style.display = 'none';
            } else {
                levelInfoEl.innerText = `Level ${currentLevel}`;
                messageLogEl.innerText = `LEVEL UP! Welcome to Level ${currentLevel}`;
                messageLogEl.style.color = "#a8dadc";
                setTimeout(spawnNextEnemy, 2000);
            }
        }

        function spawnNextEnemy() {
            enemyContainer.classList.remove('enemy-dead');
            
            const enemyData = demonList[Math.floor(Math.random() * demonList.length)];
            
            enemyImg.src = enemyData.file;
            enemyMovementWrapper.className = '';
            enemyMovementWrapper.classList.add(enemyData.moveClass);
            
            currentAnimSpeed = enemyData.baseSpeed;
            enemyMovementWrapper.style.animationDuration = currentAnimSpeed + 's';

            enemyNameEl.innerText = enemyData.name;
            
            enemyMaxHP = 4;
            enemyHP = enemyMaxHP;
            updateHealthBar();
            
            isSameQuestion = false;
            isAttacking = false;
            
            timingUI.style.display = 'none';
            mathUI.style.display = 'flex';
            strikeZoneEl.classList.remove('show-zone');
            
            messageLogEl.innerText = "A new Demon appears! Prime your magic.";
            messageLogEl.style.color = "#a8dadc";
            
            generateProblem();
        }

        // Initialize first enemy on load
        window.onload = () => {
            spawnNextEnemy();
        };

    </script>
</body>
</html>
