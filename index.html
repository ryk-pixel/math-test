    <script>
        // --- Background Music System ---
        let backgroundMusicEnabled = true;
        let musicPlayer = null;
        let currentMusicLevel = 1;

        // Pixabay Music - Royalty-free K-pop/huntrex style instrumentals
        const musicTracks = {
            1: "https://pixabay.com/music/download/colorful-abstract-animation-154129/", // Level 1: Bright, energetic
            2: "https://pixabay.com/music/download/futuristic-electronic-beat-124584/", // Level 2: Moderate intensity
            3: "https://pixabay.com/music/download/epic-cinematic-action-154456/"      // Level 3: Dark, intense
        };

        // Alternative direct MP3 links (if Pixabay downloads don't work, use these streaming alternatives)
        const musicTracksBackup = {
            1: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", // Fallback: bright track
            2: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", // Fallback: moderate track
            3: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"  // Fallback: intense track
        };

        function toggleBackgroundMusic() {
            backgroundMusicEnabled = !backgroundMusicEnabled;
            const btn = document.getElementById('music-toggle-btn');
            btn.innerText = backgroundMusicEnabled ? '🔊 Music: ON' : '🔇 Music: OFF';
            
            if (backgroundMusicEnabled) {
                playBackgroundMusic(currentMusicLevel);
            } else {
                stopBackgroundMusic();
            }
        }

        async function playBackgroundMusic(level) {
            if (!backgroundMusicEnabled) return;

            stopBackgroundMusic();
            currentMusicLevel = level;

            let trackUrl = musicTracks[level];
            if (!trackUrl) {
                console.warn(`No music track found for level ${level}`);
                return;
            }

            try {
                musicPlayer = new Audio(trackUrl);
                musicPlayer.crossOrigin = "anonymous";
                musicPlayer.loop = true;
                musicPlayer.volume = 0.25; // 25% volume for background
                
                // Attempt to play
                const playPromise = musicPlayer.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Primary URL failed, trying backup...", error);
                        // Try backup URL
                        const backupUrl = musicTracksBackup[level];
                        if (backupUrl && backupUrl !== trackUrl) {
                            musicPlayer = new Audio(backupUrl);
                            musicPlayer.crossOrigin = "anonymous";
                            musicPlayer.loop = true;
                            musicPlayer.volume = 0.25;
                            musicPlayer.play().catch(e => {
                                console.log("Backup URL also failed - music will start on user interaction", e);
                            });
                        }
                    });
                }
            } catch (e) {
                console.error("Failed to play background music:", e);
            }
        }

        function stopBackgroundMusic() {
            if (musicPlayer) {
                musicPlayer.pause();
                musicPlayer.currentTime = 0;
                musicPlayer = null;
            }
        }

        // Try to play music on first user interaction (click/touch)
        document.addEventListener('click', () => {
            if (backgroundMusicEnabled && (!musicPlayer || musicPlayer.paused)) {
                playBackgroundMusic(currentMusicLevel);
            }
        }, { once: true });
