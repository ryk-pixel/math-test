    <script>
        // --- Background Music System ---
        let backgroundMusicEnabled = true;
        let musicPlayer = null;
        let currentMusicLevel = 1;

        // Direct streaming audio URLs - K-pop style instrumentals
        // Using verified streaming sources
        const musicTracks = {
            1: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", // Level 1: Bright, energetic
            2: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", // Level 2: Moderate intensity
            3: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"  // Level 3: Dark, intense
        };

        function toggleBackgroundMusic() {
            backgroundMusicEnabled = !backgroundMusicEnabled;
            const btn = document.getElementById('music-toggle-btn');
            btn.innerText = backgroundMusicEnabled ? '🔊 Music: ON' : '🔇 Music: OFF';
            
            if (backgroundMusicEnabled) {
                playBackgroundMusic(currentMusicLevel);
            } else {
                stopBackgroundMusic();
            }
        }

        async function playBackgroundMusic(level) {
            if (!backgroundMusicEnabled) return;

            stopBackgroundMusic();
            currentMusicLevel = level;

            const trackUrl = musicTracks[level];
            if (!trackUrl) {
                console.warn(`No music track found for level ${level}`);
                return;
            }

            try {
                musicPlayer = new Audio(trackUrl);
                musicPlayer.crossOrigin = "anonymous";
                musicPlayer.loop = true;
                musicPlayer.volume = 0.25; // 25% volume for background
                
                console.log(`Playing music for level ${level}: ${trackUrl}`);
                
                // Attempt to play
                const playPromise = musicPlayer.play();
                if (playPromise !== undefined) {
                    playPromise
                        .then(() => {
                            console.log("Music playing successfully!");
                        })
                        .catch(error => {
                            console.error("Autoplay failed:", error);
                            console.log("Music will start on first user interaction");
                        });
                }
            } catch (e) {
                console.error("Failed to play background music:", e);
            }
        }

        function stopBackgroundMusic() {
            if (musicPlayer) {
                musicPlayer.pause();
                musicPlayer.currentTime = 0;
                musicPlayer = null;
            }
        }

        // Try to play music on first user interaction (click/touch)
        document.addEventListener('click', () => {
            if (backgroundMusicEnabled && (!musicPlayer || musicPlayer.paused)) {
                console.log("User interaction detected - starting music...");
                playBackgroundMusic(currentMusicLevel);
            }
        });

        // Initialize music on page load
        window.addEventListener('load', () => {
            console.log("Page loaded - music system ready");
            // Try to play immediately (will be blocked by autoplay policy)
            playBackgroundMusic(currentMusicLevel);
        });
    </script>
